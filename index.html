    <header>
    <h1>✨🌎♻️ EcoSort 🌱🗑️✨</h1>
    <p>EcoSort is an AI-powered waste classification system that identifies waste types from images and explains their environmental impact to promote smarter, more sustainable disposal decisions.</p> 
    <p>It addressed the growing need for accurate waste sorting, which is critical for reducing landfill pollution and methane emissions.</p>
    </header>

<div class="main-card">
    <div class="upload-row">
        <label for="imageInput" class="btn btn-secondary">Choose Image</label>

        No image selected
        </div>
        <img id="preview" alt="Preview">
    </div>

    <div id="result"></div>
    </div>

    <script>
    // Add Flask API
    const API_URL = 'http://127.0.0.1:5000'
    const FACTS = {
    'Cardboard': {
        impact: [
            'Recycled: reduces demand for new wood pulp and saves trees',
            'Only recyclable if clean (no major contamination)',
            'Landfilled: takes up space and wastes reusable material'
        ],
        insight: [
            'Recycling cardboard uses significantly less energy and water than producing new cardboard',
            'Cardboard fibers can only be recycled a limited number of times before degrading'
        ],
        scenario: 'If greasy cardboard is recycled, it can contaminate entire batches, causing more waste overall.'
    },
    'Food Organics': {
        impact: [
            'Landfilled: decomposes without oxygen and produces methane (a very strong greenhouse gas)',
            'Composted: decomposes naturally and returns nutrients to soil'
        ],
        insight: [
            'Methane has about 28–34× the warming impact of CO₂ over 100 years',
            'Food waste is one of the largest contributors to landfill methane emissions'
        ],
        scenario: 'If 20 out of 100 items like this are misclassified, those 20 produce methane instead of being safely composted.'
    },
    'Glass': {
        impact: [
            'Can be recycled infinitely without losing quality',
            'Landfilled: remains unchanged for extremely long periods'
        ],
        insight: [
            'Recycling glass reduces the need for raw materials like sand and lowers energy use',
            'Heavy weight makes transporting glass waste inefficient if not recycled'
        ],
        scenario: 'If sent to landfill, glass permanently loses the ability to be reused — forever.'
    },
    'Metal': {
        impact: [
            'Highly recyclable (especially aluminum and steel)',
            'Landfilled: long-lasting waste and wasted resources'
        ],
        insight: [
            'Recycling aluminum saves up to ~95% of the energy compared to producing new aluminum',
            'Metals can be recycled repeatedly without major quality loss'
        ],
        scenario: 'Misclassifying metal as trash wastes enormous energy savings and increases resource extraction.'
    },
    'Miscellaneous Trash': {
        impact: [
            'Typically not recycled — goes to landfill or incineration'
        ],
        insight: [
            'Mixed waste increases landfill volume and may release pollutants over time',
            'Some items may take decades or longer to break down'
        ],
        scenario: 'If recyclable or compostable items are placed here, landfill waste increases unnecessarily.'
    },
    'Paper': {
        impact: [
            'Recyclable if clean and dry',
            'Wet or food-contaminated paper becomes trash'
        ],
        insight: [
            'Recycling paper reduces deforestation and water usage',
            'Paper in landfills can produce methane under low-oxygen conditions'
        ],
        scenario: 'Contaminated paper in recycling can cause entire batches to be rejected and landfilled.'
    },
    'Plastic_Opaque': {
        impact: [
            'Sometimes recyclable depending on plastic type',
            'Landfilled: persists for hundreds of years'
        ],
        insight: [
            'Producing new plastic requires fossil fuels',
            'Recycling plastic reduces energy use but is limited by sorting challenges'
        ],
        scenario: 'If sent to compost, opaque plastic contaminates organic waste streams and disrupts processing.'
    },
    'Plastic_Transparent': {
        impact: [
            'More commonly recyclable than opaque plastics',
            'Landfilled: long-term environmental persistence'
        ],
        insight: [
            'Clear plastics often have higher recycling value',
            'Recycling reduces demand for new raw plastic production'
        ],
        scenario: 'Misclassification reduces recovery of valuable recyclable materials and increases extraction demand.'
    },
    'Textile Trash': {
        impact: [
            'Landfilled: slow decomposition (especially synthetic fabrics)',
            'Some textiles can be reused, donated, or repurposed'
        ],
        insight: [
            'Synthetic fibers like polyester can take decades to break down',
            'Textile waste contributes significantly to landfill volume'
        ],
        scenario: 'Reusable clothing sent to landfill results in permanent material loss that could have served others.'
    },
    'Vegetation': {
        impact: [
            'Composted: returns nutrients to soil',
            'Landfilled: decomposes and produces methane (similar to food waste, but slower)'
        ],
        insight: [
            'Organic yard waste is a major component of composting systems',
            'Proper processing supports soil health and reduces need for synthetic fertilizers'
        ],
        scenario: 'If sent to landfill, vegetation contributes to unnecessary greenhouse gas emissions instead of enriching soil.'
    }
};

function buildFactsHTML(label) {
    const facts = FACTS[label];
    if (!facts) return '';

    const impactItems = facts.impact.map(i => `<li>${i}</li>`).join('');
    const insightItems = facts.insight.map(i => `<li>${i}</li>`).join('');

    return `
    <div class="facts-section">
        <div class="fact-card impact">
            <div class="fact-heading">⚡ Immediate Impact</div>
            <ul>${impactItems}</ul>
        </div>
        <div class="fact-card insight">
            <div class="fact-heading">🌱 Environmental Insight</div>
            <ul>${insightItems}</ul>
        </div>
        <div class="fact-card scenario">
            <div class="fact-heading">⚠️ Misclassification Scenario</div>
            <p>${facts.scenario}</p>
        </div>
    </div>`;
}
    const preview = document.getElementById("preview");
    const placeholder = document.getElementById("placeholder");
    const resultDiv = document.getElementById("result");
    const classifyBtn = document.getElementById("classifyBtn");
    let selectedFile;

    document.getElementById("imageInput").addEventListener("change", (event) => {
        selectedFile = event.target.files[0];
        if (!selectedFile) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = "block";
            placeholder.style.display = "none";
            resultDiv.innerHTML = "";
        };
        reader.readAsDataURL(selectedFile);
    });

    classifyBtn.addEventListener("click", async () => {
        if (!selectedFile) {
            resultDiv.innerHTML = '<div class="error-msg">Please select an image first.</div>';
            return;
        }

        classifyBtn.disabled = true;
        classifyBtn.textContent = "Classifying…";
    
        const formData = new FormData();
        formData.append('image', selectedFile);
    
        try {
            const response = await fetch(`${API_URL}/predict`, {
            method: 'POST',
            body: formData
            });

        if (!response.ok) throw new Error('Classification failed');

        const data = await response.json();
        const pct = (data.confidence * 100).toFixed(1); 
        resultDiv.innerHTML = `
            <div class="result-card">
                <div class="result-label">Predicted Class</div>
                <div class="result-class">${data.label}</div>
                <div class="result-confidence">Confidence: ${pct}%</div>
                <div class="confidence-bar-wrap">
                <div class="confidence-bar" style="width: ${pct}%"></div>
                </div>
            </div>
            ${buildFactsHTML(data.label)}
        `;

        } catch (err) {
            resultDiv.innerHTML = `<div class="error-msg">Error: ${err.message}. Make sure Flask is running.</div>`;
        } finally {
            classifyBtn.disabled = false;
            classifyBtn.textContent = "Classify";
        }
    });
    </script>
</body>
</html> -->

<body>

    <header>
        <div class="badge">♻ ML Classifier</div>
        <h1>Real Waste Classification</h1>
        <p>Classify waste by upload or live camera</p>
    </header>

    <!-- Tab buttons -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('upload')">📁 Upload Image</button>
        <button class="tab-btn" onclick="switchTab('camera')">📷 Live Camera</button>
    </div>

    <!-- Upload panel -->
    <div class="panel active" id="panel-upload">
        <div class="card">
            <div class="upload-row">
                <label for="imageInput" class="btn btn-secondary">Choose Image</label>
                <input type="file" id="imageInput" accept="image/*" style="display:none;">
                <button id="classifyBtn" class="btn btn-primary">Classify</button>
            </div>

            <div class="preview-box">
                <div class="preview-placeholder" id="placeholder">
                    <span>🗑️</span>
                    No image selected
                </div>
                <img id="preview" alt="Preview">
            </div>

            <div id="result"></div>
        </div>
    </div>

    <!-- Camera panel -->
    <div class="panel" id="panel-camera">
        <div class="card">
            <div class="cam-controls">
                <button id="startBtn" class="btn btn-primary" onclick="startCamera()">Start Camera</button>
                <button id="stopBtn" class="btn btn-danger" onclick="stopCamera()" disabled>Stop</button>
            </div>

            <div class="video-wrap">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas"></canvas>
            </div>

            <div class="status-bar">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">Camera off</span>
            </div>

            <div id="detections"></div>
        </div>
    </div>

    <footer>YOLOv8 + EfficientNetB7 · RealWaste Dataset · 10 classes</footer>

    <script>
    const API_URL = 'http://127.0.0.1:5000';

    // ── Tab switching ──────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', (i === 0) === (tab === 'upload'));
        });
        document.getElementById('panel-upload').classList.toggle('active', tab === 'upload');
        document.getElementById('panel-camera').classList.toggle('active', tab === 'camera');
        if (tab === 'upload') stopCamera();
    }

    // ── Upload & Classify ──────────────────────────────────────
    const preview = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');
    const resultDiv = document.getElementById('result');
    const classifyBtn = document.getElementById('classifyBtn');
    let selectedFile;

    document.getElementById('imageInput').addEventListener('change', (event) => {
        selectedFile = event.target.files[0];
        if (!selectedFile) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            placeholder.style.display = 'none';
            resultDiv.innerHTML = '';
        };
        reader.readAsDataURL(selectedFile);
    });

    classifyBtn.addEventListener('click', async () => {
        if (!selectedFile) {
            resultDiv.innerHTML = '<div class="error-msg">Please select an image first.</div>';
            return;
        }
        classifyBtn.disabled = true;
        classifyBtn.textContent = 'Classifying…';

        const formData = new FormData();
        formData.append('image', selectedFile);

        try {
            const response = await fetch(`${API_URL}/predict`, { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Classification failed');
            const data = await response.json();
            const pct = (data.confidence * 100).toFixed(1);
            resultDiv.innerHTML = `
                <div class="result-card">
                    <div class="result-label">Predicted Class</div>
                    <div class="result-class">${data.label}</div>
                    <div class="result-confidence">Confidence: ${pct}%</div>
                    <div class="confidence-bar-wrap">
                        <div class="confidence-bar" style="width:${pct}%"></div>
                    </div>
                </div>`;
        } catch (err) {
            resultDiv.innerHTML = `<div class="error-msg">Error: ${err.message}. Make sure Flask is running.</div>`;
        } finally {
            classifyBtn.disabled = false;
            classifyBtn.textContent = 'Classify';
        }
    });

    // ── Live Camera & Detection ────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const detectionsDiv = document.getElementById('detections');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    let stream = null;
    let detecting = false;
    let intervalId = null;

    const CLASS_COLORS = {
        'Cardboard': '#1a6faa', 'Food Organics': '#27ae60',
        'Glass': '#8e44ad', 'Metal': '#d35400',
        'Miscellaneous Trash': '#7f8c8d', 'Paper': '#2980b9',
        'Plastic_Opaque': '#e74c3c', 'Plastic_Transparent': '#e67e22',
        'Textile Trash': '#c0392b', 'Vegetation': '#16a085',
    };

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            };
            startBtn.disabled = true;
            stopBtn.disabled = false;
            setStatus('active', 'Camera active — detecting every 2s');
            intervalId = setInterval(runDetection, 2000);
        } catch (err) {
            setStatus('error', 'Camera access denied');
            detectionsDiv.innerHTML = `<div class="error-msg">Could not access camera: ${err.message}</div>`;
        }
    }

    function stopCamera() {
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        detectionsDiv.innerHTML = '';
        startBtn.disabled = false;
        stopBtn.disabled = true;
        setStatus('', 'Camera off');
    }

    async function runDetection() {
        if (detecting || !stream) return;
        detecting = true;
        setStatus('processing', 'Detecting...');
        try {
            const offscreen = document.createElement('canvas');
            offscreen.width = video.videoWidth;
            offscreen.height = video.videoHeight;
            offscreen.getContext('2d').drawImage(video, 0, 0);
            const blob = await new Promise(res => offscreen.toBlob(res, 'image/jpeg', 0.8));
            const formData = new FormData();
            formData.append('image', blob, 'frame.jpg');

            const response = await fetch(`${API_URL}/detect`, { method: 'POST', body: formData });
            if (!response.ok) throw new Error('Detection failed');
            const data = await response.json();
            drawBoxes(data.detections);
            showDetections(data.detections);
            setStatus('active', `Found ${data.detections.length} object(s)`);
        } catch (err) {
            setStatus('error', 'Error: ' + err.message);
        } finally {
            detecting = false;
        }
    }

    function drawBoxes(detections) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        detections.forEach(det => {
            const [x1, y1, x2, y2] = det.box;
            const color = CLASS_COLORS[det.label] || '#1a6faa';
            const pct = (det.confidence * 100).toFixed(0);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            const label = `${det.label} ${pct}%`;
            ctx.font = 'bold 13px DM Sans, sans-serif';
            const textW = ctx.measureText(label).width + 10;
            ctx.fillStyle = color;
            ctx.fillRect(x1, y1 - 24, textW, 24);
            ctx.fillStyle = 'white';
            ctx.fillText(label, x1 + 5, y1 - 7);
        });
    }

    function showDetections(detections) {
        if (detections.length === 0) {
            detectionsDiv.innerHTML = '<div class="no-detections">No waste detected in frame</div>';
            return;
        }
        detectionsDiv.innerHTML = detections.map(det => {
            const pct = (det.confidence * 100).toFixed(1);
            const color = CLASS_COLORS[det.label] || '#1a6faa';
            return `
                <div class="detection-item">
                    <div class="detection-label" style="color:${color}">${det.label}</div>
                    <div class="conf-bar-wrap">
                        <div class="conf-bar" style="width:${pct}%;background:${color}"></div>
                    </div>
                    <div class="detection-conf">${pct}%</div>
                </div>`;
        }).join('');
    }

    function setStatus(type, text) {
        statusDot.className = 'dot' + (type ? ' ' + type : '');
        statusText.textContent = text;
    }
    </script>
</body>
</html>
